# Set the default terminal to support 256 colors
set -g default-terminal "tmux-256color"
# Enable true color (24-bit) support for the current terminal
set -ga terminal-overrides ",$TERM:Tc"

# Use Ctrl+Space as prefix to avoid conflicts with bash readline shortcuts (Ctrl+A/Ctrl+B)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Reload tmux config with prefix+r and show a confirmation message
bind r source-file ~/.tmux.conf \; display "Configuration reloaded"

# Split window vertically, keeping the current pane's working directory
bind '"' split-window -v -c "#{pane_current_path}"
# Split window horizontally, keeping the current pane's working directory
bind % split-window -h -c "#{pane_current_path}"

# Use vi key bindings in copy mode
set -g mode-keys vi
# Enter copy mode with prefix+Enter, intuitive alternative to prefix+[
bind Enter copy-mode
# Vim-style selection and copy
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-selection-and-cancel

# Enable mouse support (click, scroll, resize panes)
set -g mouse on

# Place the status bar at the bottom of the screen
set -g status-position bottom

# Set Catppuccin theme flavor
set -g @catppuccin_flavor 'mocha' # latte, frappe, macchiato or mocha
set -g @catppuccin_window_status_style 'slanted' # basic, rounded, slanted, custom, or none

# Load TPM (Tmux Plugin Manager)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'catppuccin/tmux'

# Initialize the Catppuccin theme early (before status bar config)
run ~/.tmux/plugins/tmux/catppuccin.tmux

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right ""
#set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -g @catppuccin_window_text " #{?automatic-rename,#{pane_current_command},󰓹 #W}"
set -g @catppuccin_window_current_text " #{?automatic-rename,#{pane_current_command},󰓹 #W}"

# Initialize TPM — must be the last line in the config
run '~/.tmux/plugins/tpm/tpm'

